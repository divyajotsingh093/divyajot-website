<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 330" font-family="'Geist', system-ui, sans-serif" role="img" aria-label="A goal-decomposer meta-agent reads a goal and assembles a swarm of sub-agents from a prompt at runtime, then merges their results — powerful for open-ended research, where a fixed declarative graph still wins for regulated production.">
  <defs>
    <marker id="arw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5d6271"/>
    </marker>
  </defs>

  <text x="32" y="34" fill="#8b8f9d" font-size="13" letter-spacing="2" font-weight="600">SWARM ASSEMBLY · RESEARCH DIRECTION</text>

  <!-- goal -->
  <rect x="22" y="120" width="104" height="56" rx="10" fill="#161922" stroke="#2c3148"/>
  <text x="74" y="153" text-anchor="middle" fill="#ece9e0" font-size="13">Goal</text>
  <line x1="126" y1="148" x2="158" y2="148" stroke="#5d6271" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- decomposer -->
  <rect x="160" y="112" width="176" height="72" rx="11" fill="#11131a" stroke="#f0b264" stroke-opacity="0.55"/>
  <text x="248" y="140" text-anchor="middle" fill="#f0b264" font-size="13" font-weight="600">Goal-decomposer</text>
  <text x="248" y="158" text-anchor="middle" fill="#f0b264" font-size="13" font-weight="600">meta-agent</text>
  <text x="248" y="176" text-anchor="middle" fill="#8b8f9d" font-size="10.5">assembles the swarm from a prompt</text>

  <!-- fan-out sub-agents -->
  <g text-anchor="middle" font-size="11.5">
    <rect x="392" y="62"  width="150" height="40" rx="9" fill="#161922" stroke="#2c3148"/><text x="467" y="87" fill="#ece9e0">sub-agent</text>
    <rect x="392" y="114" width="150" height="40" rx="9" fill="#161922" stroke="#2c3148"/><text x="467" y="139" fill="#ece9e0">sub-agent</text>
    <rect x="392" y="166" width="150" height="40" rx="9" fill="#161922" stroke="#2c3148"/><text x="467" y="191" fill="#ece9e0">sub-agent</text>
    <rect x="392" y="218" width="150" height="40" rx="9" fill="#161922" stroke="#2c3148"/><text x="467" y="243" fill="#ece9e0">sub-agent · n</text>
  </g>
  <g stroke="#5d6271" stroke-width="1.3">
    <line x1="336" y1="140" x2="388" y2="84"  marker-end="url(#arw)"/>
    <line x1="336" y1="146" x2="388" y2="134" marker-end="url(#arw)"/>
    <line x1="336" y1="154" x2="388" y2="186" marker-end="url(#arw)"/>
    <line x1="336" y1="160" x2="388" y2="238" marker-end="url(#arw)"/>
  </g>

  <!-- merge -->
  <rect x="592" y="120" width="146" height="56" rx="11" fill="#6ad6e6" fill-opacity="0.09" stroke="#6ad6e6" stroke-opacity="0.5"/>
  <text x="665" y="145" text-anchor="middle" fill="#6ad6e6" font-size="12.5" font-weight="600">Merge results</text>
  <text x="665" y="163" text-anchor="middle" fill="#8b8f9d" font-size="10.5">decomposer reconciles</text>
  <g stroke="#5d6271" stroke-width="1.3">
    <line x1="542" y1="82"  x2="590" y2="138" marker-end="url(#arw)"/>
    <line x1="542" y1="134" x2="588" y2="146" marker-end="url(#arw)"/>
    <line x1="542" y1="186" x2="590" y2="154" marker-end="url(#arw)"/>
    <line x1="542" y1="238" x2="590" y2="166" marker-end="url(#arw)"/>
  </g>

  <text x="380" y="300" text-anchor="middle" fill="#5d6271" font-size="11.5" font-style="italic">assembled swarm wins for open-ended research · a fixed declarative graph still wins in regulated production</text>
</svg>
