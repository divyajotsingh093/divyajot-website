<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="'Geist', system-ui, sans-serif" role="img" aria-label="Between two agents sits a verifier checkpoint that runs deterministic checks — schema validity, source grounding, business rules. Passing hands off to the next agent; failing escalates to a human. Every checkpoint is logged to an audit trail.">
  <defs>
    <marker id="arv" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5d6271"/>
    </marker>
  </defs>

  <text x="32" y="34" fill="#8b8f9d" font-size="13" letter-spacing="2" font-weight="600">THE DETERMINISTIC VERIFIER LAYER</text>

  <!-- agent A -->
  <rect x="22" y="118" width="118" height="58" rx="10" fill="#161922" stroke="#2c3148"/>
  <text x="81" y="151" text-anchor="middle" fill="#ece9e0" font-size="13">Agent A</text>
  <line x1="140" y1="147" x2="186" y2="147" stroke="#5d6271" stroke-width="1.5" marker-end="url(#arv)"/>
  <text x="163" y="138" text-anchor="middle" fill="#8b8f9d" font-size="9.5">contract</text>

  <!-- checkpoint -->
  <rect x="188" y="92" width="252" height="112" rx="12" fill="#11131a" stroke="#ff5a3c" stroke-opacity="0.5"/>
  <text x="314" y="116" text-anchor="middle" fill="#ff8a73" font-size="13" font-weight="600">Verifier checkpoint</text>
  <text x="206" y="142" fill="#6ad6e6" font-size="12">✓ schema valid</text>
  <text x="206" y="163" fill="#6ad6e6" font-size="12">✓ grounded in source</text>
  <text x="206" y="184" fill="#6ad6e6" font-size="12">✓ business rules satisfied</text>
  <text x="430" y="198" text-anchor="end" fill="#5d6271" font-size="10">deterministic · no LLM</text>

  <!-- pass -->
  <line x1="440" y1="120" x2="556" y2="104" stroke="#5d6271" stroke-width="1.5" marker-end="url(#arv)"/>
  <text x="498" y="100" text-anchor="middle" fill="#6ad6e6" font-size="10.5">pass</text>
  <rect x="558" y="84" width="178" height="48" rx="10" fill="#6ad6e6" fill-opacity="0.10" stroke="#6ad6e6" stroke-opacity="0.55"/>
  <text x="647" y="113" text-anchor="middle" fill="#6ad6e6" font-size="12.5" font-weight="600">Hand off → Agent B</text>

  <!-- fail -->
  <line x1="440" y1="176" x2="556" y2="192" stroke="#5d6271" stroke-width="1.5" marker-end="url(#arv)"/>
  <text x="498" y="172" text-anchor="middle" fill="#ff8a73" font-size="10.5">fail</text>
  <rect x="558" y="172" width="178" height="48" rx="10" fill="#ff5a3c" fill-opacity="0.10" stroke="#ff5a3c" stroke-opacity="0.55"/>
  <text x="647" y="201" text-anchor="middle" fill="#ff8a73" font-size="12.5" font-weight="600">Human escalation</text>

  <!-- audit trail -->
  <rect x="22" y="252" width="714" height="44" rx="10" fill="#161922" stroke="#2c3148"/>
  <text x="379" y="279" text-anchor="middle" fill="#8b8f9d" font-size="12">every checkpoint logged → an audit trail you can hand a regulator</text>
  <line x1="314" y1="204" x2="314" y2="250" stroke="#5d6271" stroke-width="1.3" stroke-dasharray="3 3" marker-end="url(#arv)"/>
</svg>
