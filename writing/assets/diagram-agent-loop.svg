<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="'Geist', system-ui, sans-serif" role="img" aria-label="The agent loop: context, infer, act, observe, update state, check done, repeat. Reliability compounds — 0.95 to the 20th power is about 36 percent — so every point of per-step reliability lives in the loop.">
  <defs>
    <marker id="arl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5d6271"/>
    </marker>
  </defs>

  <text x="32" y="34" fill="#8b8f9d" font-size="13" letter-spacing="2" font-weight="600">THE AGENT LOOP</text>

  <!-- clockwise arrows around the ring -->
  <g stroke="#5d6271" stroke-width="1.6" fill="none">
    <line x1="318" y1="72"  x2="442" y2="72"  marker-end="url(#arl)"/>
    <line x1="556" y1="96"  x2="612" y2="186" marker-end="url(#arl)"/>
    <line x1="612" y1="234" x2="556" y2="324" marker-end="url(#arl)"/>
    <line x1="442" y1="348" x2="318" y2="348" marker-end="url(#arl)"/>
    <line x1="204" y1="324" x2="150" y2="234" marker-end="url(#arl)"/>
    <line x1="150" y1="186" x2="204" y2="96"  marker-end="url(#arl)"/>
  </g>
  <text x="120" y="150" fill="#8b8f9d" font-size="10.5" transform="rotate(-58 120 150)">repeat</text>

  <!-- nodes -->
  <g text-anchor="middle" font-size="13.5">
    <rect x="184" y="50"  width="132" height="44" rx="10" fill="#161922" stroke="#2c3148"/><text x="250" y="77" fill="#ece9e0">context</text>
    <rect x="444" y="50"  width="132" height="44" rx="10" fill="#161922" stroke="#2c3148"/><text x="510" y="77" fill="#ece9e0">infer</text>
    <rect x="566" y="188" width="124" height="44" rx="10" fill="#161922" stroke="#ff5a3c" stroke-opacity="0.5"/><text x="628" y="215" fill="#ff8a73">act</text>
    <rect x="444" y="326" width="132" height="44" rx="10" fill="#161922" stroke="#2c3148"/><text x="510" y="353" fill="#ece9e0">observe</text>
    <rect x="184" y="326" width="132" height="44" rx="10" fill="#161922" stroke="#2c3148"/><text x="250" y="353" fill="#ece9e0">update state</text>
    <rect x="62"  y="188" width="132" height="44" rx="10" fill="#161922" stroke="#f0b264" stroke-opacity="0.5"/><text x="128" y="215" fill="#f0b264">check done</text>
  </g>

  <!-- center: the compounding stat -->
  <text x="380" y="196" text-anchor="middle" fill="#5d6271" font-size="12">reliability compounds</text>
  <text x="380" y="232" text-anchor="middle" fill="#ff5a3c" font-size="30" font-family="'Instrument Serif', serif">0.95²⁰ ≈ 36%</text>
  <text x="380" y="256" text-anchor="middle" fill="#8b8f9d" font-size="11.5">every point you claw back lives in the loop</text>

  <text x="380" y="404" text-anchor="middle" fill="#5d6271" font-size="12" font-style="italic">prompts get you the first 60% — managing the loop gets you the part that ships</text>
</svg>
