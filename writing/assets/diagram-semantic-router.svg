<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="'Geist', system-ui, sans-serif" role="img" aria-label="A semantic router embeds each task and routes it to one of three tiers — edge, mid, or frontier — trading cost against capability so each sub-task runs on the cheapest model that can do it.">
  <defs>
    <marker id="ars" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5d6271"/>
    </marker>
  </defs>

  <text x="32" y="34" fill="#8b8f9d" font-size="13" letter-spacing="2" font-weight="600">TIERED MODEL SELECTION</text>

  <!-- request -->
  <rect x="20" y="142" width="104" height="56" rx="10" fill="#161922" stroke="#2c3148"/>
  <text x="72" y="170" text-anchor="middle" fill="#ece9e0" font-size="13">Sub-task</text>
  <text x="72" y="188" text-anchor="middle" fill="#8b8f9d" font-size="10.5">one of many</text>
  <line x1="124" y1="170" x2="156" y2="170" stroke="#5d6271" stroke-width="1.5" marker-end="url(#ars)"/>

  <!-- router -->
  <rect x="158" y="132" width="184" height="76" rx="11" fill="#11131a" stroke="#f0b264" stroke-opacity="0.55"/>
  <text x="250" y="162" text-anchor="middle" fill="#f0b264" font-size="13.5" font-weight="600">Semantic router</text>
  <text x="250" y="181" text-anchor="middle" fill="#8b8f9d" font-size="11">sentence-transformer</text>
  <text x="250" y="196" text-anchor="middle" fill="#8b8f9d" font-size="11">embeds task → matches tier</text>

  <!-- branches -->
  <line x1="342" y1="150" x2="436" y2="92"  stroke="#5d6271" stroke-width="1.5" marker-end="url(#ars)"/>
  <line x1="342" y1="170" x2="436" y2="170" stroke="#5d6271" stroke-width="1.5" marker-end="url(#ars)"/>
  <line x1="342" y1="190" x2="436" y2="248" stroke="#5d6271" stroke-width="1.5" marker-end="url(#ars)"/>

  <!-- tiers -->
  <rect x="438" y="58" width="300" height="62" rx="10" fill="#6ad6e6" fill-opacity="0.08" stroke="#6ad6e6" stroke-opacity="0.5"/>
  <text x="456" y="82" fill="#6ad6e6" font-size="12.5" font-weight="600">Edge / small</text>
  <text x="456" y="102" fill="#b9bcc6" font-size="11.5">phi-3-mini · Qwen-VL-3B — cheap, fast, most traffic</text>

  <rect x="438" y="139" width="300" height="62" rx="10" fill="#161922" stroke="#2c3148"/>
  <text x="456" y="163" fill="#ece9e0" font-size="12.5" font-weight="600">Mid</text>
  <text x="456" y="183" fill="#b9bcc6" font-size="11.5">mid-size open model — the balanced default</text>

  <rect x="438" y="220" width="300" height="62" rx="10" fill="#ff5a3c" fill-opacity="0.08" stroke="#ff5a3c" stroke-opacity="0.5"/>
  <text x="456" y="244" fill="#ff8a73" font-size="12.5" font-weight="600">Frontier</text>
  <text x="456" y="264" fill="#b9bcc6" font-size="11.5">rented GPT / Claude class — only when it earns it</text>

  <text x="250" y="262" text-anchor="middle" fill="#5d6271" font-size="11.5" font-style="italic">cheapest model</text>
  <text x="250" y="280" text-anchor="middle" fill="#5d6271" font-size="11.5" font-style="italic">that can do the job</text>
</svg>
