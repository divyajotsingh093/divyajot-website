<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="'Geist', system-ui, sans-serif" role="img" aria-label="Orchestration calls a model, shows the output on a dashboard, and leaves a human to do the real work. Coordination resolves entities, carries state, and verifies before writing across systems — and holds when the data is ambiguous.">
  <defs>
    <marker id="arc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5d6271"/>
    </marker>
  </defs>

  <!-- divider -->
  <line x1="380" y1="50" x2="380" y2="330" stroke="#1f2333"/>

  <!-- ORCHESTRATION -->
  <text x="32" y="38" fill="#8b8f9d" font-size="13" letter-spacing="2" font-weight="600">ORCHESTRATION</text>
  <g text-anchor="middle" font-size="12">
    <rect x="40" y="62"  width="300" height="40" rx="9" fill="#161922" stroke="#2c3148"/><text x="190" y="87" fill="#ece9e0">script fires → calls a model</text>
    <rect x="40" y="124" width="300" height="40" rx="9" fill="#161922" stroke="#2c3148"/><text x="190" y="149" fill="#ece9e0">model generates a response</text>
    <rect x="40" y="186" width="300" height="40" rx="9" fill="#161922" stroke="#2c3148"/><text x="190" y="211" fill="#ece9e0">dashboard renders it</text>
    <rect x="40" y="248" width="300" height="44" rx="9" fill="#ff5a3c" fill-opacity="0.08" stroke="#ff5a3c" stroke-opacity="0.45"/><text x="190" y="275" fill="#ff8a73">human does the real work</text>
  </g>
  <g stroke="#5d6271" stroke-width="1.4">
    <line x1="190" y1="102" x2="190" y2="122" marker-end="url(#arc)"/>
    <line x1="190" y1="164" x2="190" y2="184" marker-end="url(#arc)"/>
    <line x1="190" y1="226" x2="190" y2="246" marker-end="url(#arc)"/>
  </g>
  <text x="190" y="318" text-anchor="middle" fill="#5d6271" font-size="11.5" font-style="italic">automation with better grammar</text>

  <!-- COORDINATION -->
  <text x="420" y="38" fill="#ff8a73" font-size="13" letter-spacing="2" font-weight="600">COORDINATION</text>
  <g text-anchor="middle" font-size="12">
    <rect x="420" y="62"  width="300" height="40" rx="9" fill="#161922" stroke="#2c3148"/><text x="570" y="87" fill="#ece9e0">business intent in</text>
    <rect x="420" y="124" width="300" height="40" rx="9" fill="#161922" stroke="#6ad6e6" stroke-opacity="0.4"/><text x="570" y="149" fill="#ece9e0">resolve entities · carry state</text>
    <rect x="420" y="186" width="300" height="40" rx="9" fill="#161922" stroke="#f0b264" stroke-opacity="0.45"/><text x="570" y="211" fill="#ece9e0">verify before it writes</text>
    <rect x="420" y="248" width="300" height="44" rx="9" fill="#6ad6e6" fill-opacity="0.09" stroke="#6ad6e6" stroke-opacity="0.5"/><text x="570" y="275" fill="#6ad6e6">true across systems of record</text>
  </g>
  <g stroke="#5d6271" stroke-width="1.4">
    <line x1="570" y1="102" x2="570" y2="122" marker-end="url(#arc)"/>
    <line x1="570" y1="164" x2="570" y2="184" marker-end="url(#arc)"/>
    <line x1="570" y1="226" x2="570" y2="246" marker-end="url(#arc)"/>
  </g>
  <text x="570" y="318" text-anchor="middle" fill="#6ad6e6" font-size="11.5" font-style="italic">when data is ambiguous, it says “I can't prove this yet” — and holds</text>
</svg>
