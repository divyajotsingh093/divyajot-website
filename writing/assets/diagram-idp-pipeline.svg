<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 330" font-family="'Geist', system-ui, sans-serif" role="img" aria-label="Two very different document classes feed a single OCR-free Qwen2.5-VL pipeline that extracts structured fields, handles Buddhist-Era dates, verifies the output, and reaches 94 percent on real documents.">
  <defs>
    <marker id="ari" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5d6271"/>
    </marker>
  </defs>

  <text x="32" y="34" fill="#8b8f9d" font-size="13" letter-spacing="2" font-weight="600">OCR-FREE IDP — MIXED THAI–ENGLISH APS</text>

  <!-- two doc classes -->
  <rect x="22" y="74" width="190" height="68" rx="10" fill="#161922" stroke="#2c3148"/>
  <text x="38" y="100" fill="#ece9e0" font-size="12.5">Public-hospital OPD</text>
  <text x="38" y="120" fill="#8b8f9d" font-size="11">printed Thai · clean bundles</text>

  <rect x="22" y="190" width="190" height="68" rx="10" fill="#161922" stroke="#2c3148"/>
  <text x="38" y="216" fill="#ece9e0" font-size="12.5">Private-clinic form</text>
  <text x="38" y="236" fill="#8b8f9d" font-size="11">handwritten · Thai + English</text>

  <line x1="212" y1="108" x2="270" y2="150" stroke="#5d6271" stroke-width="1.5" marker-end="url(#ari)"/>
  <line x1="212" y1="224" x2="270" y2="182" stroke="#5d6271" stroke-width="1.5" marker-end="url(#ari)"/>

  <!-- model -->
  <rect x="272" y="138" width="190" height="58" rx="11" fill="#11131a" stroke="#f0b264" stroke-opacity="0.55"/>
  <text x="367" y="162" text-anchor="middle" fill="#f0b264" font-size="13" font-weight="600">Qwen2.5-VL-72B</text>
  <text x="367" y="181" text-anchor="middle" fill="#8b8f9d" font-size="11">OCR-free — reads pixels, not text</text>
  <line x1="462" y1="167" x2="494" y2="167" stroke="#5d6271" stroke-width="1.5" marker-end="url(#ari)"/>

  <!-- extraction -->
  <rect x="496" y="138" width="156" height="58" rx="11" fill="#161922" stroke="#2c3148"/>
  <text x="574" y="162" text-anchor="middle" fill="#ece9e0" font-size="12.5">Structured extract</text>
  <text x="574" y="181" text-anchor="middle" fill="#8b8f9d" font-size="11">+ Buddhist-Era dates</text>
  <line x1="652" y1="167" x2="684" y2="167" stroke="#5d6271" stroke-width="1.5" marker-end="url(#ari)"/>

  <!-- verify -->
  <rect x="686" y="138" width="56" height="58" rx="11" fill="#161922" stroke="#2c3148"/>
  <text x="714" y="163" text-anchor="middle" fill="#6ad6e6" font-size="11">verify</text>
  <text x="714" y="180" text-anchor="middle" fill="#6ad6e6" font-size="11">✓</text>

  <!-- result -->
  <rect x="272" y="236" width="470" height="46" rx="10" fill="#6ad6e6" fill-opacity="0.08" stroke="#6ad6e6" stroke-opacity="0.5"/>
  <text x="507" y="264" text-anchor="middle" fill="#6ad6e6" font-size="13" font-weight="600">94% extraction accuracy on real documents — customer signed</text>
  <line x1="367" y1="196" x2="367" y2="234" stroke="#5d6271" stroke-width="1.3" stroke-dasharray="3 3" marker-end="url(#ari)"/>
</svg>
