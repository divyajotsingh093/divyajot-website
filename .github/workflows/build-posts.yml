name: Build writing

# Rebuild the on-site writing pages whenever post sources or the builder change.
on:
  push:
    paths:
      - "content/posts/**"
      - "scripts/build_posts.py"
      - "writing/assets/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build posts
        run: python scripts/build_posts.py

      - name: Commit generated writing if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain writing posts.json)" ]]; then
            git add writing posts.json
            git commit -m "chore(writing): rebuild $(date -u +%Y-%m-%d)"
            git push
            echo "Committed writing rebuild."
          else
            echo "No changes to writing — skipping commit."
          fi
